<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Seed Firebase — Sahabat Koperasi</title>
<style>
  body{font-family:sans-serif;background:#0a0f1e;color:#e2e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;}
  .box{background:#111827;border:1px solid #1e3050;border-radius:16px;padding:32px;width:400px;text-align:center;}
  h2{color:#00c896;margin-bottom:8px;}
  p{color:#64748b;font-size:.85rem;margin-bottom:24px;}
  button{background:linear-gradient(135deg,#00c896,#00a07a);color:#000;font-weight:800;font-size:1rem;border:none;padding:14px 32px;border-radius:10px;cursor:pointer;width:100%;}
  button:hover{opacity:.85;}
  button:disabled{opacity:.5;cursor:not-allowed;}
  .log{margin-top:20px;text-align:left;font-family:monospace;font-size:.75rem;background:#1a2235;border-radius:8px;padding:12px;max-height:200px;overflow-y:auto;}
  .ok{color:#00c896;} .err{color:#ef4444;} .info{color:#f59e0b;}
</style>
</head>
<body>
<div class="box">
  <h2>🌱 Seed Data Koperasi</h2>
  <p>Klik tombol di bawah untuk mengisi data awal ke Firebase</p>
  <button id="seedBtn" onclick="runSeed()">Mulai Seed Data</button>
  <div class="log" id="log"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCot1YKW52YQsjed16Uhou2NgbtUxhhaX8",
  authDomain: "sahabat-koperasi.firebaseapp.com",
  projectId: "sahabat-koperasi",
  storageBucket: "sahabat-koperasi.firebasestorage.app",
  messagingSenderId: "91239464857",
  appId: "1:91239464857:web:2010261cc98ff66c995d08"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

function log(msg, type="info"){
  const el = document.getElementById("log");
  el.innerHTML += `<div class="${type}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

window.runSeed = async function(){
  const btn = document.getElementById("seedBtn");
  btn.disabled = true;
  btn.textContent = "Sedang proses...";

  try {
    // 1. SETTINGS
    log("📝 Menyimpan pengaturan...");
    await setDoc(doc(db,"koperasi","settings"), {
      nama: "Sahabat Koperasi SDC Group",
      tahun: 2026,
      modalAwal: 0,
      bungaDefault: 2
    });
    log("✓ Pengaturan disimpan", "ok");

    // 2. MODAL MASUK
    log("💰 Menyimpan modal masuk Juni...");
    const modalMasuk = Array.from({length:12}, (_,i) => ({
      items: [
        {label:"Penerimaan modal pribadi",             nilai: i===5 ? 150000000 : 0},
        {label:"Penerimaan modal dari simpanan karyawan", nilai: i===5 ? 14600000 : 0},
        {label:"Penerimaan modal dari seragam",        nilai: i===5 ? 20017995 : 0},
        {label:"Penerimaan bunga periode berjalan",    nilai: i===5 ? 1210000 : 0},
        {label:"Lainnya",                              nilai: 0},
      ]
    }));
    await setDoc(doc(db,"koperasi","modalMasuk"), { data: modalMasuk });
    log("✓ Modal masuk disimpan", "ok");

    // 3. PINJAMAN JUNI (index 5)
    log("📋 Menyimpan data pinjaman Juni...");
    const pinjamanJuni = [
      {id:"p_1", nama:"Prasetyo",           divisi:"Manajemen",       status:"Aktif", nominal:15000000,  cicilan:18, sisaCicilan:8,  bungaRate:1},
      {id:"p_2", nama:"Sandi",              divisi:"Manajemen",       status:"Aktif", nominal:6000000,   cicilan:12, sisaCicilan:4,  bungaRate:1},
      {id:"p_3", nama:"Dicky Candra Irawan",divisi:"Manajemen",       status:"Aktif", nominal:127000000, cicilan:16, sisaCicilan:16, bungaRate:0},
      {id:"p_4", nama:"Adilul",             divisi:"Manajemen",       status:"Aktif", nominal:16000000,  cicilan:12, sisaCicilan:12, bungaRate:1},
      {id:"p_5", nama:"Wahyu Nugroho",      divisi:"Central Gudang",  status:"Aktif", nominal:5000000,   cicilan:8,  sisaCicilan:6,  bungaRate:1.5},
      {id:"p_6", nama:"Fajar",              divisi:"SSS Honggowongso",status:"Aktif", nominal:2000000,   cicilan:2,  sisaCicilan:2,  bungaRate:2},
      {id:"p_7", nama:"Army",               divisi:"—",               status:"Macet", nominal:3120000,   cicilan:0,  sisaCicilan:0,  bungaRate:0},
      {id:"p_8", nama:"Bagong (Widi)",      divisi:"—",               status:"Macet", nominal:330000,    cicilan:0,  sisaCicilan:0,  bungaRate:0},
      {id:"p_9", nama:"Papo (Deva)",        divisi:"—",               status:"Macet", nominal:1000000,   cicilan:0,  sisaCicilan:0,  bungaRate:0},
      {id:"p_10",nama:"Ganda",              divisi:"—",               status:"Macet", nominal:1000000,   cicilan:0,  sisaCicilan:0,  bungaRate:0},
      {id:"p_11",nama:"Cakmat",             divisi:"—",               status:"Macet", nominal:200000,    cicilan:0,  sisaCicilan:0,  bungaRate:0},
      {id:"p_12",nama:"Mbelung (Agung)",    divisi:"—",               status:"Macet", nominal:1800000,   cicilan:0,  sisaCicilan:0,  bungaRate:0},
      {id:"p_13",nama:"Rian Budi Setiawan", divisi:"SSS Honggowongso",status:"Macet", nominal:3100514,   cicilan:0,  sisaCicilan:0,  bungaRate:0},
    ];
    await setDoc(doc(db,"koperasi","pinjaman_5"), { list: pinjamanJuni });
    log("✓ Data pinjaman Juni disimpan (13 anggota)", "ok");

    // 4. Bulan lain kosong
    log("📅 Menyimpan bulan lain (kosong)...");
    for(let i=0;i<12;i++){
      if(i===5) continue;
      await setDoc(doc(db,"koperasi",`pinjaman_${i}`), { list: [] });
    }
    log("✓ Semua bulan disimpan", "ok");

    log("🎉 SELESAI! Semua data berhasil disimpan ke Firebase!", "ok");
    btn.textContent = "✓ Seed Selesai!";
    btn.style.background = "#22c55e";

  } catch(e) {
    log("❌ Error: " + e.message, "err");
    btn.disabled = false;
    btn.textContent = "Coba Lagi";
  }
};
</script>
</body>
</html>
